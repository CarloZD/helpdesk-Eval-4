events {
    worker_connections 1024;
}

http {
    upstream backend {
        server ravishing-illumination.railway.internal:5000;
    }

    upstream frontend {
        server stellar-comfort.railway.internal:8080;
    }

    server {
        listen 8080;

        # Proxy /api/* requests to the backend service.
        # The /api prefix is stripped before forwarding.
        location /api/ {
            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Proxy all other requests to the frontend service.
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (required for Next.js HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
